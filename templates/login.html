<!DOCTYPE html>
<html>
<body>

<h1>Login</h1>

<form method="POST">

    <input
        type="text"
        name="username"
        placeholder="Username"
        required>

    <input
        type="password"
        name="password"
        placeholder="Master Password"
        required>

    <button type="submit">
        Login
    </button>

</form>

<a href="/register">Register</a>

</body>
</html>
