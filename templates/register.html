<!DOCTYPE html>
<html>
<body>

<h1>Create Account</h1>

<form method="POST">

    <input
        type="text"
        name="username"
        placeholder="Username"
        required>

    <input
        type="password"
        name="password"
        placeholder="Master Password"
        required>

    <button type="submit">
        Register
    </button>

</form>

</body>
</html>
